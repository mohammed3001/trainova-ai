services:
  postgres:
    image: postgres:16-alpine
    container_name: trainova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trainova
      POSTGRES_PASSWORD: trainova
      POSTGRES_DB: trainova
    ports:
      - "5432:5432"
    volumes:
      - trainova_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainova -d trainova"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trainova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trainova_pgdata:
